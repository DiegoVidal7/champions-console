<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidalero's Battle Console</title>
<style>
:root{
  --bg:#0a0e14;
  --panel:#121822;
  --panel-2:#0f141d;
  --edge:#232c3a;
  --edge-bright:#33favascript;
  --ink:#e8edf4;
  --ink-dim:#8695a8;
  --ink-faint:#5a6879;
  --gold:#e6b450;
  --ally:#3a7bd5;
  --enemy:#d0455a;
  --enemy-glow:rgba(208,69,90,.15);
  --ally-glow:rgba(58,123,213,.12);
  --font-display:"Rajdhani","Oswald",system-ui,sans-serif;
  --font-body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
body{
  background-image:radial-gradient(circle at 18% 12%,rgba(58,123,213,.06),transparent 42%),radial-gradient(circle at 82% 88%,rgba(208,69,90,.06),transparent 42%);
  background-attachment:fixed;min-height:100vh;padding:20px 22px 60px}
.wrap{max-width:1500px;margin:0 auto}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:6px 4px 20px;border-bottom:1px solid var(--edge);margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:14px}
.brand h1{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.brand .tag{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600}
.status{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--ink-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);display:inline-block;margin-right:6px;vertical-align:middle}
.dot.live{background:#41d17f;box-shadow:0 0 8px #41d17f}
.dot.err{background:var(--enemy)}
.btn{font-family:var(--font-display);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;padding:9px 16px;border-radius:7px;border:1px solid var(--edge);background:var(--panel);color:var(--ink);cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--ink-dim);background:#182030}
.btn.reset{border-color:rgba(208,69,90,.4);color:#e88}
.btn.reset:hover{background:var(--enemy-glow);border-color:var(--enemy)}
.btn.ghost{background:transparent}

/* Battlefield layout */
.field{display:grid;grid-template-columns:1fr 1.15fr;gap:26px}
@media(max-width:1080px){.field{grid-template-columns:1fr}}
.side-label{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.26em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.side-label.ally{color:var(--ally)}
.side-label.enemy{color:var(--enemy)}
.side-label::after{content:"";flex:1;height:1px;background:currentColor;opacity:.25}
.side-label .count{font-size:11px;color:var(--ink-faint);letter-spacing:.1em}

/* Slots */
.slot-grid{display:grid;gap:12px}
.ally-grid{grid-template-columns:1fr 1fr}
@media(max-width:560px){.ally-grid{grid-template-columns:1fr}}
.active-grid{grid-template-columns:1fr 1fr;margin-bottom:22px}
@media(max-width:560px){.active-grid{grid-template-columns:1fr}}
.bench-grid{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:900px){.bench-grid{grid-template-columns:1fr 1fr}}

.bench-head{font-family:var(--font-display);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:4px 0 12px;font-weight:600}

/* Card */
.card{background:var(--panel);border:1px solid var(--edge);border-radius:11px;overflow:hidden;position:relative;transition:.18s}
.card.ally{border-left:3px solid var(--ally)}
.card.enemy{border-left:3px solid var(--enemy)}
.card.filled.enemy{box-shadow:0 0 0 1px rgba(208,69,90,.15),0 8px 30px -12px var(--enemy-glow)}
.card.filled.ally{box-shadow:0 0 0 1px rgba(58,123,213,.12),0 8px 30px -12px var(--ally-glow)}
.card.big{min-height:230px}

/* Search head inside card */
.card-search{position:relative;padding:12px 12px 10px}
.card-search input{width:100%;background:var(--panel-2);border:1px solid var(--edge);color:var(--ink);font-family:var(--font-body);font-size:14px;padding:10px 12px;border-radius:7px;outline:none;transition:.15s}
.card-search input:focus{border-color:var(--gold)}
.card-search input::placeholder{color:var(--ink-faint)}
.slotname{font-family:var(--font-display);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px;font-weight:600}

/* Autocomplete */
.ac{position:absolute;left:12px;right:12px;top:100%;z-index:40;background:#141b26;border:1px solid var(--edge-bright,#2c3646);border-radius:8px;margin-top:-2px;max-height:230px;overflow-y:auto;box-shadow:0 18px 40px -10px rgba(0,0,0,.7)}
.ac div{padding:9px 13px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.03)}
.ac div:last-child{border-bottom:none}
.ac div:hover,.ac div.sel{background:#1d2735}
.ac .mini-types{margin-left:auto;display:flex;gap:4px}

/* Filled card body */
.pkm{padding:0 13px 14px;display:none}
.card.filled .pkm{display:block}
.card.filled .card-search{display:none}
.pkm-head{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 0 9px;border-bottom:1px solid var(--edge);margin-bottom:9px}
.pkm-name{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.03em;line-height:1}
.pkm-name .clear{font-size:15px;color:var(--ink-faint);cursor:pointer;margin-left:8px;font-family:var(--font-body)}
.pkm-name .clear:hover{color:var(--enemy)}
.types{display:flex;gap:5px}
.chip{font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:5px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35)}

.section-t{font-family:var(--font-display);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin:11px 0 6px;font-weight:600}
.moves{display:flex;flex-wrap:wrap;gap:5px}
.move{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--edge);border-radius:20px;padding:4px 10px 4px 8px;font-size:12.5px;line-height:1.1;white-space:nowrap}
.move .mtype{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.move .mname{font-weight:500}
/* move pill tinted subtly by its type via inline border color */
.move.status{opacity:.82}

.lookout{background:var(--enemy-glow);border:1px solid rgba(208,69,90,.35);border-radius:7px;padding:8px 11px;margin-top:11px}
.lookout .lo-t{font-family:var(--font-display);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--enemy);font-weight:700;margin-bottom:2px}
.lookout .lo-v{font-size:13.5px;font-weight:600;color:#ffd0d6;line-height:1.3}

.meta{display:grid;grid-template-columns:auto 1fr;gap:5px 8px;margin-top:11px;align-items:baseline}
.meta .m{display:contents}
.meta .m .k{font-family:var(--font-display);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap;padding-top:1px}
.meta .m .v{font-size:12.5px;color:var(--ink);line-height:1.3}
.meta .m.wide .k,.meta .m.wide .v{grid-column:auto}
.speed-badge{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--gold)}
/* inline speed+items row to save vertical space */
.metatop{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.metatop .box{background:var(--panel-2);border:1px solid var(--edge);border-radius:7px;padding:7px 9px}
.metatop .box .k{font-family:var(--font-display);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.metatop .box .v{font-size:12.5px;margin-top:2px;line-height:1.3}

/* weaknesses */
.weakbox{margin-top:10px}
.weakrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.wk{font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:4px;color:#fff}
.wk .mult{font-size:8.5px;opacity:.85;background:rgba(0,0,0,.28);padding:1px 3px;border-radius:3px}

.empty-hint{font-size:12px;color:var(--ink-faint);text-align:center;padding:10px 0 4px;font-style:italic}

/* Ally mini card (compact) */
.card.ally .pkm-name{font-size:17px}
.card.ally.big{min-height:auto}

.loading-veil{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100;transition:opacity .4s}
.loading-veil.gone{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--edge);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-veil .lt{font-family:var(--font-display);letter-spacing:.24em;text-transform:uppercase;font-size:13px;color:var(--ink-dim)}

footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--edge);font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
a.link{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="loading-veil" id="veil"><div class="spinner"></div><div class="lt">Syncing roster</div></div>

<div class="wrap">
<header>
  <div class="brand">
    <h1>Battle Console</h1>
    <span class="tag">Champions &middot; Doubles</span>
  </div>
  <div class="status">
    <span id="syncStat"><span class="dot" id="syncDot"></span><span id="syncTxt">connecting</span></span>
    <button class="btn ghost" id="saveBtn" title="Copy a code that restores your team">Save Team</button>
    <button class="btn ghost" id="loadBtn">Load Team</button>
    <button class="btn reset" id="resetBtn">Reset Opponent</button>
  </div>
</header>

<div class="field">
  <!-- ALLY SIDE -->
  <section>
    <div class="side-label ally">Your Team <span class="count">6 slots &middot; persists</span></div>
    <div class="slot-grid ally-grid" id="allyGrid"></div>
  </section>

  <!-- ENEMY SIDE -->
  <section>
    <div class="side-label enemy">Opponent <span class="count">2 active + bench</span></div>
    <div class="slot-grid active-grid" id="activeGrid"></div>
    <div class="bench-head">Revealed Bench</div>
    <div class="slot-grid bench-grid" id="benchGrid"></div>
  </section>
</div>

<footer>
  <span>Data source: live Google Sheet (WebData tab). Edit the sheet, refresh to update.</span>
  <span id="countTxt"></span>
</footer>
</div>

Steel:{Fire:.5,Water:.5,Electric:.5,Ice:2,Rock:2,Steel:.5,Fairy:2},
Fairy:{Fire:.5,Fighting:2,Poison:.5,Dragon:2,Dark:2,Steel:.5}
};
function defProfile(types){
  const res={};TYPES.forEach(a=>res[a]=1);
  types.forEach(def=>{TYPES.forEach(atk=>{const m=(CHART[atk]&&CHART[atk][def]!==undefined)?CHART[atk][def]:1;res[atk]*=m;});});
  return res;
}
function normType(t){t=t.trim().toLowerCase();return TYPES.find(x=>x.toLowerCase()===t)||null;}
function moveType(name){
  let k=name.trim().toLowerCase().replace(/\s*\(\d+%\)\s*$/,'');
  return MOVE_TYPES[k]||null;
}

/* ---- CSV parse ---- */
function parseCSV(text){
  const rows=[];let i=0,f='',row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
      else if(c==='\r'){}else f+=c;}
    i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows;
}
function toObjects(rows){
  if(!rows.length)return[];
  const H=rows[0].map(h=>h.trim().toLowerCase());
  const idx=n=>H.indexOf(n);
  const iName=idx("pokemon"),iType=idx("type"),iAbil=idx("ability"),iMoves=idx("moves"),
    iItems=idx("held items"),iNat=idx("nature"),iIV=idx("ivs"),iSpd=idx("base speed"),
    iLook=idx("look out for"),iNotes=idx("notes");
  const out=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r];if(!c)continue;
    const name=(c[iName]||"").trim();if(!name)continue;
    const splitList=s=>(s||"").split(/[,;\n]/).map(x=>x.trim()).filter(Boolean);
    out.push({
      name,
      types:(c[iType]||"").split(/[\/,]/).map(t=>normType(t)).filter(Boolean),
      typeRaw:(c[iType]||"").trim(),
      ability:(c[iAbil]||"").trim(),
      moves:splitList(c[iMoves]),
      items:splitList(c[iItems]),
      natures:splitList(c[iNat]),
      ivs:(c[iIV]||"").trim(),
      speed:(c[iSpd]||"").trim(),
      lookout:(c[iLook]||"").trim(),
      notes:(c[iNotes]||"").trim()
    });
  }
  return out;
}

/* ---- State ---- */
let DEX=[];      // array of pokemon objects
let DEXMAP={};   // lowername -> obj
const SLOTS={ally:new Array(6).fill(null),active:new Array(2).fill(null),bench:new Array(4).fill(null)};

/* ---- Rendering helpers ---- */
function chip(t){return `<span class="chip" style="background:${TYPE_COLORS[t]}">${t}</span>`;}
function typeChips(types){return `<div class="types">${types.map(chip).join('')}</div>`;}

function movesHTML(moves){
  if(!moves.length)return '';
  return `<div class="section-t">Moves</div><div class="moves">${moves.map(m=>{
    const cleanName=m.replace(/\s*\(\d+%\)\s*$/,'');
    const t=moveType(m);
    const col=t?TYPE_COLORS[t]:'#444';
    const dot=`<span class="mtype" style="background:${col}"></span>`;
    return `<div class="move" style="border-color:${col}55" title="${t||''}">${dot}<span class="mname">${cleanName}</span></div>`;
  }).join('')}</div>`;
}
function weakHTML(types){
  if(!types.length)return '';
  const prof=defProfile(types);
  const groups={"4":[],"2":[],"0":[],"0.25":[],"0.5":[]};
  Object.entries(prof).forEach(([atk,m])=>{
    if(m===4)groups["4"].push(atk);else if(m===2)groups["2"].push(atk);
    else if(m===0)groups["0"].push(atk);else if(m===0.25)groups["0.25"].push(atk);
    else if(m===0.5)groups["0.5"].push(atk);
  });
  const pill=(atk,mult,label)=>`<span class="wk" style="background:${TYPE_COLORS[atk]}">${atk}<span class="mult">${label}</span></span>`;
  let html='<div class="weakbox">';
  if(groups["4"].length||groups["2"].length){
    html+='<div class="section-t" style="color:var(--enemy)">Weak To</div><div class="weakrow">';
    html+=groups["4"].map(a=>pill(a,4,'4x')).join('');
    html+=groups["2"].map(a=>pill(a,2,'2x')).join('');
    html+='</div>';
  }
  const resists=[...groups["0.25"].map(a=>[a,'¼']),...groups["0.5"].map(a=>[a,'½']),...groups["0"].map(a=>[a,'0'])];
  if(resists.length){
    html+='<div class="section-t" style="color:#41d17f">Resists</div><div class="weakrow">';
    html+=resists.map(([a,l])=>pill(a,l,l)).join('');
    html+='</div>';
  }
  html+='</div>';
  return html;
}

function cardBodyEnemy(p){
  let h=`<div class="pkm-head"><div class="pkm-name">${p.name}<span class="clear" data-clear="1">&times;</span></div>${typeChips(p.types)}</div>`;
  if(p.lookout)h+=`<div class="lookout"><div class="lo-t">Look Out For</div><div class="lo-v">${p.lookout}</div></div>`;
  h+=movesHTML(p.moves);
  // top row: speed + items side by side (most-glanced info)
  h+='<div class="metatop">';
  h+=`<div class="box"><div class="k">Base Speed</div><div class="v"><span class="speed-badge">${p.speed||'&mdash;'}</span></div></div>`;
  h+=`<div class="box"><div class="k">Items</div><div class="v">${p.items.length?p.items.join(', '):'&mdash;'}</div></div>`;
  h+='</div>';
  // tight label|value grid for the rest
  h+='<div class="meta">';
  if(p.natures.length)h+=`<div class="m"><div class="k">Nature</div><div class="v">${p.natures.join(' &middot; ')}</div></div>`;
  if(p.ivs)h+=`<div class="m"><div class="k">IVs</div><div class="v">${p.ivs}</div></div>`;
  if(p.ability)h+=`<div class="m"><div class="k">Ability</div><div class="v">${p.ability}</div></div>`;
  h+='</div>';
  return h;
}
function cardBodyAlly(p){
  let h=`<div class="pkm-head"><div class="pkm-name">${p.name}<span class="clear" data-clear="1">&times;</span></div>${typeChips(p.types)}</div>`;
  h+=weakHTML(p.types);
  h+=movesHTML(p.moves);
  h+='<div class="metatop">';
  h+=`<div class="box"><div class="k">Base Speed</div><div class="v"><span class="speed-badge">${p.speed||'&mdash;'}</span></div></div>`;
  h+=`<div class="box"><div class="k">Items</div><div class="v">${p.items.length?p.items.join(', '):'&mdash;'}</div></div>`;
  h+='</div>';
  return h;
}
function cardBodyBench(p){
  let h=`<div class="pkm-head"><div class="pkm-name">${p.name}<span class="clear" data-clear="1">&times;</span></div>${typeChips(p.types)}</div>`;
  if(p.lookout)h+=`<div class="lookout"><div class="lo-t">Watch</div><div class="lo-v">${p.lookout}</div></div>`;
  if(p.speed)h+=`<div class="section-t">Speed <span class="speed-badge" style="font-size:13px">${p.speed}</span></div>`;
  return h;
}

/* ---- Slot factory ---- */
function makeSlot(kind,idx,cls,label){
  const card=document.createElement('div');
  card.className=`card ${cls}${kind==='bench'?'':' big'}`;
  card.dataset.kind=kind;card.dataset.idx=idx;
  card.innerHTML=`
    <div class="card-search">
      <div class="slotname">${label}</div>
      <input type="text" placeholder="Search Pok&eacute;mon&hellip;" autocomplete="off">
      <div class="ac" style="display:none"></div>
    </div>
    <div class="pkm"></div>`;
  const input=card.querySelector('input');
  const ac=card.querySelector('.ac');
  let selIdx=-1,matches=[];
  function render(){
    const q=input.value.trim().toLowerCase();
    matches=q?DEX.filter(p=>p.name.toLowerCase().includes(q)).slice(0,8):[];
    if(!matches.length){ac.style.display='none';return;}
    ac.innerHTML=matches.map((p,i)=>`<div data-i="${i}" class="${i===selIdx?'sel':''}">${p.name}<span class="mini-types">${p.types.map(t=>`<span class="chip" style="background:${TYPE_COLORS[t]};font-size:9px;padding:2px 6px">${t}</span>`).join('')}</span></div>`).join('');
    ac.style.display='block';
  }
  function choose(p){SLOTS[kind][idx]=p.name;fill(card,kind,p);ac.style.display='none';input.value='';}
  input.addEventListener('input',()=>{selIdx=-1;render();});
  input.addEventListener('keydown',e=>{
    if(ac.style.display==='none')return;
    if(e.key==='ArrowDown'){selIdx=Math.min(selIdx+1,matches.length-1);render();e.preventDefault();}
    else if(e.key==='ArrowUp'){selIdx=Math.max(selIdx-1,0);render();e.preventDefault();}
    else if(e.key==='Enter'){if(matches[selIdx])choose(matches[selIdx]);else if(matches.length===1)choose(matches[0]);e.preventDefault();}
    else if(e.key==='Escape'){ac.style.display='none';}
  });
  ac.addEventListener('mousedown',e=>{const d=e.target.closest('[data-i]');if(d)choose(matches[+d.dataset.i]);});
  input.addEventListener('blur',()=>setTimeout(()=>ac.style.display='none',150));
  card.querySelector('.pkm').addEventListener('click',e=>{if(e.target.dataset.clear){SLOTS[kind][idx]=null;unfill(card);}});
  return card;
}
function fill(card,kind,p){
  const body=card.querySelector('.pkm');
  body.innerHTML=kind==='ally'?cardBodyAlly(p):kind==='bench'?cardBodyBench(p):cardBodyEnemy(p);
  card.classList.add('filled');
}
function unfill(card){card.classList.remove('filled');card.querySelector('.pkm').innerHTML='';const i=card.querySelector('input');i.value='';}

/* ---- Build UI ---- */
function build(){
  const ag=document.getElementById('allyGrid');
  for(let i=0;i<6;i++)ag.appendChild(makeSlot('ally',i,'ally',`Ally ${i+1}`));
  const acg=document.getElementById('activeGrid');
  for(let i=0;i<2;i++)acg.appendChild(makeSlot('active',i,'enemy',`Active ${i+1}`));
  const bg=document.getElementById('benchGrid');
  for(let i=0;i<4;i++)bg.appendChild(makeSlot('bench',i,'enemy',`Bench ${i+1}`));
}
function restoreSlots(){
  ['ally','active','bench'].forEach(kind=>{
    SLOTS[kind].forEach((nm,idx)=>{
      if(!nm)return;const p=DEXMAP[nm.toLowerCase()];if(!p)return;
      const card=document.querySelector(`.card[data-kind="${kind}"][data-idx="${idx}"]`);
      if(card)fill(card,kind,p);
    });
  });
}

/* ---- Data load ---- */
function setSync(state,txt){
  const dot=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  dot.className='dot'+(state==='live'?' live':state==='err'?' err':'');
  t.textContent=txt;
}
async function load(){
  setSync('','connecting');
  try{
    const res=await fetch(CSV_URL+((CSV_URL.includes('?')?'&':'?')+'_cb='+Date.now()));
    if(!res.ok)throw new Error('HTTP '+res.status);
    const txt=await res.text();
    DEX=toObjects(parseCSV(txt));
    DEXMAP={};DEX.forEach(p=>DEXMAP[p.name.toLowerCase()]=p);
    setSync('live',DEX.length+' Pok&eacute;mon live');
    document.getElementById('syncTxt').innerHTML=DEX.length+' Pok&eacute;mon live';
    document.getElementById('countTxt').textContent=DEX.length+' entries loaded';
    restoreSlots();
  }catch(err){
    setSync('err','sheet unreachable');
    document.getElementById('countTxt').textContent='Load error: '+err.message;
    console.error(err);
  }
  document.getElementById('veil').classList.add('gone');
}

/* ---- Save / Load team codes ---- */
document.getElementById('saveBtn').addEventListener('click',()=>{
  const code=btoa(unescape(encodeURIComponent(JSON.stringify(SLOTS))));
  navigator.clipboard.writeText(code).then(()=>{
    prompt('Team code copied. Paste this anywhere to save it, or use Load Team later:',code);
  }).catch(()=>prompt('Copy this team code:',code));
});
document.getElementById('loadBtn').addEventListener('click',()=>{
  const code=prompt('Paste your team code:');
  if(!code)return;
  try{
    const data=JSON.parse(decodeURIComponent(escape(atob(code.trim()))));
    ['ally','active','bench'].forEach(k=>{if(data[k])SLOTS[k]=data[k];});
    document.querySelectorAll('.card').forEach(c=>unfill(c));
    restoreSlots();
  }catch(e){alert('That code could not be read.');}
});
document.getElementById('resetBtn').addEventListener('click',()=>{
  SLOTS.active=new Array(2).fill(null);SLOTS.bench=new Array(4).fill(null);
  document.querySelectorAll('.card[data-kind="active"],.card[data-kind="bench"]').forEach(c=>unfill(c));
});

build();load();
</script>
</body>
</html>
