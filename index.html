<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vidalero's Battle Console</title>
<link id="favicon" rel="icon" type="image/png" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png">
<script>
// Favicon fallback: if the PokeAPI Jolteon sprite fails to load, swap to an alternate host.
(function(){
  var test=new Image();
  test.onload=function(){ if(test.naturalWidth===0) swap(); };
  test.onerror=swap;
  test.src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/135.png";
  function swap(){
    var f=document.getElementById('favicon');
    if(f)f.href="https://img.pokemondb.net/sprites/home/normal/jolteon.png";
  }
})();
</script>
<style>
:root{
  --bg:#0a0e14;
  --panel:#121822;
  --panel-2:#0f141d;
  --edge:#232c3a;
  --edge-bright:#33favascript;
  --ink:#e8edf4;
  --ink-dim:#8695a8;
  --ink-faint:#5a6879;
  --gold:#e6b450;
  --ally:#3a7bd5;
  --enemy:#d0455a;
  --enemy-glow:rgba(208,69,90,.15);
  --ally-glow:rgba(58,123,213,.12);
  --font-display:"Rajdhani","Oswald",system-ui,sans-serif;
  --font-body:"Inter",system-ui,-apple-system,sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:var(--bg);color:var(--ink);font-family:var(--font-body);-webkit-font-smoothing:antialiased}
body{
  background-image:radial-gradient(circle at 18% 12%,rgba(58,123,213,.06),transparent 42%),radial-gradient(circle at 82% 88%,rgba(208,69,90,.06),transparent 42%);
  background-attachment:fixed;min-height:100vh;padding:20px 22px 60px}
.wrap{max-width:1500px;margin:0 auto}

/* Header */
header{display:flex;align-items:center;justify-content:space-between;gap:20px;padding:6px 4px 20px;border-bottom:1px solid var(--edge);margin-bottom:24px;flex-wrap:wrap}
.brand{display:flex;align-items:baseline;gap:14px}
.brand h1{font-family:var(--font-display);font-weight:700;font-size:28px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink)}
.brand .tag{font-size:11px;letter-spacing:.32em;text-transform:uppercase;color:var(--gold);font-weight:600}
.status{display:flex;align-items:center;gap:16px;font-size:12px;color:var(--ink-dim)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--ink-faint);display:inline-block;margin-right:6px;vertical-align:middle}
.dot.live{background:#41d17f;box-shadow:0 0 8px #41d17f}
.dot.err{background:var(--enemy)}
.btn{font-family:var(--font-display);font-weight:600;letter-spacing:.1em;text-transform:uppercase;font-size:13px;padding:9px 16px;border-radius:7px;border:1px solid var(--edge);background:var(--panel);color:var(--ink);cursor:pointer;transition:.15s}
.btn:hover{border-color:var(--ink-dim);background:#182030}
.btn.reset{border-color:rgba(208,69,90,.4);color:#e88}
.btn.reset:hover{background:var(--enemy-glow);border-color:var(--enemy)}
.btn.ghost{background:transparent}

/* Battlefield layout */
.field{display:grid;grid-template-columns:1fr 1.15fr;gap:26px}
@media(max-width:1080px){.field{grid-template-columns:1fr}}
.side-label{font-family:var(--font-display);font-weight:600;font-size:13px;letter-spacing:.26em;text-transform:uppercase;margin-bottom:14px;display:flex;align-items:center;gap:10px}
.side-label.ally{color:var(--ally)}
.side-label.enemy{color:var(--enemy)}
.side-label::after{content:"";flex:1;height:1px;background:currentColor;opacity:.25}
.side-label .count{font-size:11px;color:var(--ink-faint);letter-spacing:.1em}

/* Slots */
.slot-grid{display:grid;gap:12px}
.ally-grid{grid-template-columns:1fr 1fr}
@media(max-width:560px){.ally-grid{grid-template-columns:1fr}}
.active-grid{grid-template-columns:1fr 1fr;margin-bottom:22px}
@media(max-width:560px){.active-grid{grid-template-columns:1fr}}
.bench-grid{grid-template-columns:1fr 1fr 1fr 1fr}
@media(max-width:900px){.bench-grid{grid-template-columns:1fr 1fr}}

.bench-head{font-family:var(--font-display);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-faint);margin:4px 0 12px;font-weight:600}

/* Speed Ladder */
#speedPanel{margin-top:30px;border-top:1px solid var(--edge);padding-top:22px}
.side-label.speed{color:var(--gold)}
.ladder-head{display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap;margin-bottom:16px}
.ladder-head .side-label{margin-bottom:0}
.mods{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.modbtn{font-family:var(--font-display);font-weight:600;letter-spacing:.08em;text-transform:uppercase;font-size:11px;padding:7px 12px;border-radius:6px;border:1px solid var(--edge);background:var(--panel);color:var(--ink-dim);cursor:pointer;transition:.15s}
.modbtn:hover{border-color:var(--ink-dim);color:var(--ink)}
.modbtn.on{background:var(--gold);border-color:var(--gold);color:#1a1205}
.modbtn.scope{border-color:rgba(134,149,168,.4);color:var(--ink-dim)}
.modbtn.scope.on{background:#2a3444;border-color:var(--ink-dim);color:var(--ink)}
.modbtn.weather.on[data-weather="rain"]{background:#4d90d5;border-color:#4d90d5;color:#fff}
.modbtn.weather.on[data-weather="sun"]{background:#f0a830;border-color:#f0a830;color:#1a1205}
.modbtn.weather.on[data-weather="sand"]{background:#c7b78b;border-color:#c7b78b;color:#1a1205}
.modbtn.weather.on[data-weather="snow"]{background:#a8d8e0;border-color:#a8d8e0;color:#0a1520}
.modbtn.side-ally.on{background:var(--ally);border-color:var(--ally);color:#fff}
.modbtn.side-enemy.on{background:var(--enemy);border-color:var(--enemy);color:#fff}
.modsep{width:1px;height:20px;background:var(--edge)}
.ladder{display:flex;flex-direction:column;gap:6px}
.lad-row{display:grid;grid-template-columns:26px 1fr auto;align-items:center;gap:12px;padding:9px 14px;border-radius:9px;border:1px solid var(--edge);background:var(--panel);position:relative;overflow:hidden}
.lad-row.ally{border-left:3px solid var(--ally)}
.lad-row.enemy{border-left:3px solid var(--enemy)}
.lad-rank{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--ink-faint);text-align:center}
.lad-main{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.lad-name{font-family:var(--font-display);font-weight:700;font-size:16px;letter-spacing:.02em}
.mega-mark{display:inline-flex;align-items:center;justify-content:center;width:16px;height:16px;margin-left:4px;border-radius:50%;background:var(--gold);color:#1a1205;font-family:var(--font-display);font-weight:700;font-size:11px;line-height:1;vertical-align:middle;box-shadow:0 0 4px rgba(230,180,80,.5)}
.lad-badges{display:flex;gap:5px;flex-wrap:wrap}
.pbadge{font-family:var(--font-display);font-weight:600;font-size:9.5px;letter-spacing:.05em;text-transform:uppercase;padding:2px 7px;border-radius:20px;display:inline-flex;align-items:center;gap:4px}
.pbadge.dmg{background:rgba(230,180,80,.16);color:var(--gold);border:1px solid rgba(230,180,80,.4)}
.pbadge.sup{background:rgba(134,149,168,.12);color:var(--ink-dim);border:1px solid var(--edge)}
.pbadge.tie{background:rgba(240,168,48,.18);color:#f0a830;border:1px solid rgba(240,168,48,.5)}
.lad-row.tie{border-color:rgba(240,168,48,.35)}
.lad-row.tie .lad-num{color:#f0a830}
.lad-row.tie::after{content:"";position:absolute;left:0;top:0;bottom:0;width:3px;background:repeating-linear-gradient(0deg,#f0a830 0 4px,transparent 4px 8px)}
.lad-spd{display:flex;align-items:baseline;gap:7px}
.lad-num{font-family:var(--font-display);font-weight:700;font-size:20px;color:var(--ink)}
.lad-row.ally .lad-num{color:#7fb3f5}
.lad-row.enemy .lad-num{color:#f58aa0}
.lad-sub{font-size:10px;color:var(--ink-faint);font-family:var(--font-display);letter-spacing:.06em;text-transform:uppercase}
.lad-scarf{font-size:9px;color:var(--gold);cursor:pointer;border:1px solid rgba(230,180,80,.3);border-radius:4px;padding:1px 5px;font-family:var(--font-display);letter-spacing:.05em;text-transform:uppercase;user-select:none}
.lad-scarf.on{background:var(--gold);color:#1a1205}
.lad-par{font-size:9px;color:#c9a0e0;cursor:pointer;border:1px solid var(--edge);border-radius:4px;padding:1px 5px;font-family:var(--font-display);letter-spacing:.05em;text-transform:uppercase;user-select:none}
.lad-par.on{background:#a040a0;color:#fff;border-color:#a040a0}
.lad-mega{font-size:9px;color:var(--gold);cursor:pointer;border:1px solid rgba(230,180,80,.4);border-radius:4px;padding:1px 5px;font-family:var(--font-display);letter-spacing:.05em;text-transform:uppercase;user-select:none;font-weight:600}
.lad-mega.on{background:linear-gradient(135deg,#e6b450,#c88a2a);color:#1a1205;border-color:#e6b450}
.lad-tools{display:flex;gap:5px;align-items:center}
.ladder-empty{text-align:center;color:var(--ink-faint);font-style:italic;padding:18px 0;font-size:13px}
.ladder-note{margin-top:10px;font-size:11px;color:var(--ink-faint);line-height:1.5}
.speedline{height:1px;background:repeating-linear-gradient(90deg,var(--edge) 0 8px,transparent 8px 14px);margin:2px 0;position:relative}
.speedline span{position:absolute;top:-8px;left:50%;transform:translateX(-50%);background:var(--bg);padding:0 8px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-faint);font-family:var(--font-display)}

/* Card */
.card{background:var(--panel);border:1px solid var(--edge);border-radius:11px;overflow:hidden;position:relative;transition:.18s}
.card.ally{border-left:3px solid var(--ally)}
.card.enemy{border-left:3px solid var(--enemy)}
.card.filled.enemy{box-shadow:0 0 0 1px rgba(208,69,90,.15),0 8px 30px -12px var(--enemy-glow)}
.card.filled.ally{box-shadow:0 0 0 1px rgba(58,123,213,.12),0 8px 30px -12px var(--ally-glow)}
.card.big{min-height:230px}

/* Search head inside card */
.card-search{position:relative;padding:12px 12px 10px}
.card-search input{width:100%;background:var(--panel-2);border:1px solid var(--edge);color:var(--ink);font-family:var(--font-body);font-size:14px;padding:10px 12px;border-radius:7px;outline:none;transition:.15s}
.card-search input:focus{border-color:var(--gold)}
.card-search input::placeholder{color:var(--ink-faint)}
.slotname{font-family:var(--font-display);font-size:10px;letter-spacing:.18em;text-transform:uppercase;color:var(--ink-faint);margin-bottom:7px;font-weight:600}

/* Autocomplete */
.ac{position:absolute;left:12px;right:12px;top:100%;z-index:40;background:#141b26;border:1px solid var(--edge-bright,#2c3646);border-radius:8px;margin-top:-2px;max-height:230px;overflow-y:auto;box-shadow:0 18px 40px -10px rgba(0,0,0,.7)}
.ac div{padding:9px 13px;cursor:pointer;font-size:14px;display:flex;align-items:center;gap:9px;border-bottom:1px solid rgba(255,255,255,.03)}
.ac div:last-child{border-bottom:none}
.ac div:hover,.ac div.sel{background:#1d2735}
.ac .mini-types{margin-left:auto;display:flex;gap:4px}

/* Filled card body */
.pkm{padding:0 13px 14px;display:none}
.card.filled .pkm{display:block}
.card.ally.fixed .pkm{display:block}
.card.filled .card-search{display:none}
.pkm-head{display:flex;align-items:center;justify-content:space-between;gap:8px 10px;padding:12px 0 9px;border-bottom:1px solid var(--edge);margin-bottom:9px;flex-wrap:wrap}
.pkm-name{font-family:var(--font-display);font-weight:700;font-size:20px;letter-spacing:.03em;line-height:1;flex:1 1 auto;min-width:0;display:flex;align-items:center;gap:8px}
.pkm-sprite{width:34px;height:34px;object-fit:contain;image-rendering:pixelated;flex:0 0 auto;filter:drop-shadow(0 1px 2px rgba(0,0,0,.4))}

/* my-active selection highlight */
.card.ally{cursor:pointer;transition:.15s}
.card.ally.collapsed .pkm-head{margin-bottom:0;border-bottom:none;padding-bottom:10px}
.card.ally.myactive{box-shadow:0 0 0 2px var(--ally),0 8px 30px -10px var(--ally-glow)}
.card.ally .pkm{padding-bottom:12px}
.caret{font-size:11px;color:var(--ink-faint);margin-left:4px;transition:transform .15s;display:inline-block}
.caret.open{transform:rotate(180deg)}
.ally-compact{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:0 0 2px}
.ac-speed{display:flex;align-items:baseline;gap:6px}
.ac-k{font-family:var(--font-display);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.act-btn{font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.08em;text-transform:uppercase;padding:4px 10px;border-radius:6px;border:1px solid var(--edge);background:var(--panel-2);color:var(--ink-dim);cursor:pointer;transition:.15s;user-select:none}
.act-btn:hover{border-color:var(--ally);color:var(--ink)}
.act-btn.on{background:var(--ally);border-color:var(--ally);color:#fff}
.ally-details{margin-top:11px;border-top:1px solid var(--edge);padding-top:11px}

/* threat section on opponent active cards */
.threats{margin-top:11px;border-top:1px solid var(--edge);padding-top:9px}
.threats-slot:not(:empty){margin-bottom:2px}
.base-spd{font-family:var(--font-display);font-weight:700;font-size:13px;color:var(--gold)}
.thr-head{font-family:var(--font-display);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin-bottom:7px;font-weight:600}
.thr-row{margin-bottom:7px}
.thr-vs{font-family:var(--font-display);font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;display:block;margin-bottom:4px}
.thr-list{display:flex;flex-wrap:wrap;gap:4px}
.thr{font-family:var(--font-display);font-weight:600;font-size:10.5px;letter-spacing:.03em;padding:3px 8px;border-radius:5px;display:inline-flex;align-items:center;gap:4px}
.thr.danger{background:var(--enemy-glow);color:#ffb3bf;border:1px solid rgba(208,69,90,.45)}
.thr.good{background:rgba(65,209,127,.13);color:#7fe0a8;border:1px solid rgba(65,209,127,.4)}
.thr.immune{background:rgba(134,149,168,.12);color:var(--ink-dim);border:1px solid var(--edge)}
.thr.oppimmune{background:rgba(134,149,168,.12);color:var(--ink-dim);border:1px solid var(--edge)}
.thr.even{color:var(--ink-faint);font-style:italic;font-weight:500;letter-spacing:.02em}
.pkm-name .clear{font-size:15px;color:var(--ink-faint);cursor:pointer;margin-left:8px;font-family:var(--font-body)}
.pkm-name .clear:hover{color:var(--enemy)}
.types{display:flex;gap:5px;flex:0 0 auto;flex-wrap:wrap;justify-content:flex-end}
.chip{font-family:var(--font-display);font-weight:600;font-size:11px;letter-spacing:.08em;text-transform:uppercase;padding:3px 9px;border-radius:5px;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.35);white-space:nowrap}

.section-t{font-family:var(--font-display);font-size:10px;letter-spacing:.2em;text-transform:uppercase;color:var(--ink-dim);margin:11px 0 6px;font-weight:600}
.moves{display:flex;flex-wrap:wrap;gap:5px}
.move{display:flex;align-items:center;gap:6px;background:var(--panel-2);border:1px solid var(--edge);border-radius:20px;padding:4px 10px 4px 8px;font-size:12.5px;line-height:1.1;white-space:nowrap}
.move .mtype{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.move .mname{font-weight:500}
/* move pill tinted subtly by its type via inline border color */
.move.status{opacity:.82}

.lookout{background:var(--enemy-glow);border:1px solid rgba(208,69,90,.35);border-radius:7px;padding:8px 11px;margin-top:11px}
.lookout .lo-t{font-family:var(--font-display);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:var(--enemy);font-weight:700;margin-bottom:2px}
.lookout .lo-v{font-size:13.5px;font-weight:600;color:#ffd0d6;line-height:1.3}
.notes-box{background:rgba(90,110,140,.14);border:1px solid rgba(120,140,170,.3);border-radius:7px;padding:8px 11px;margin-top:11px}
.notes-box .nb-t{font-family:var(--font-display);font-size:9px;letter-spacing:.2em;text-transform:uppercase;color:#8fa9c8;font-weight:700;margin-bottom:2px}
.notes-box .nb-v{font-size:13px;color:#c9d6e6;line-height:1.35}

.meta{display:grid;grid-template-columns:auto 1fr;gap:5px 8px;margin-top:11px;align-items:baseline}
.meta .m{display:contents}
.meta .m .k{font-family:var(--font-display);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600;white-space:nowrap;padding-top:1px}
.meta .m .v{font-size:12.5px;color:var(--ink);line-height:1.3}
.meta .m.wide .k,.meta .m.wide .v{grid-column:auto}
.speed-badge{font-family:var(--font-display);font-weight:700;font-size:15px;color:var(--gold)}
/* inline speed+items row to save vertical space */
.metatop{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:11px}
.metatop .box{background:var(--panel-2);border:1px solid var(--edge);border-radius:7px;padding:7px 9px}
.metatop .box .k{font-family:var(--font-display);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--ink-faint);font-weight:600}
.metatop .box .v{font-size:12.5px;margin-top:2px;line-height:1.3}

/* weaknesses */
.weakbox{margin-top:10px}
.weakrow{display:flex;flex-wrap:wrap;gap:4px;margin-top:4px}
.wk{font-family:var(--font-display);font-weight:600;font-size:10px;letter-spacing:.04em;text-transform:uppercase;padding:2px 6px;border-radius:4px;display:flex;align-items:center;gap:4px;color:#fff}
.wk .mult{font-size:8.5px;opacity:.85;background:rgba(0,0,0,.28);padding:1px 3px;border-radius:3px}

.empty-hint{font-size:12px;color:var(--ink-faint);text-align:center;padding:10px 0 4px;font-style:italic}

/* Ally mini card (compact) */
.card.ally .pkm-name{font-size:17px}
.card:not(.big) .pkm-name{font-size:16px}
.card:not(.big) .chip{font-size:10px;padding:2px 7px}
.card.ally.big{min-height:auto}

.loading-veil{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100;transition:opacity .4s}
.loading-veil.gone{opacity:0;pointer-events:none}
.spinner{width:40px;height:40px;border:3px solid var(--edge);border-top-color:var(--gold);border-radius:50%;animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-veil .lt{font-family:var(--font-display);letter-spacing:.24em;text-transform:uppercase;font-size:13px;color:var(--ink-dim)}

footer{margin-top:40px;padding-top:18px;border-top:1px solid var(--edge);font-size:11px;color:var(--ink-faint);display:flex;justify-content:space-between;flex-wrap:wrap;gap:10px}
a.link{color:var(--gold);text-decoration:none}
</style>
</head>
<body>
<div class="loading-veil" id="veil"><div class="spinner"></div><div class="lt">Syncing roster</div></div>

<div class="wrap">
<header>
  <div class="brand">
    <h1>Battle Console</h1>
    <span class="tag">Champions &middot; Doubles</span>
  </div>
  <div class="status">
    <span id="syncStat"><span class="dot" id="syncDot"></span><span id="syncTxt">connecting</span></span>
    <button class="btn ghost" id="refreshBtn" title="Reload latest data from your sheet">Refresh</button>
    <button class="btn reset" id="resetBtn">Reset Opponent</button>
  </div>
</header>

<div class="field">
  <!-- ALLY SIDE -->
  <section>
    <div class="side-label ally">Your Team <span class="count">from MyTeam tab</span></div>
    <div class="slot-grid ally-grid" id="allyGrid"></div>
  </section>

  <!-- ENEMY SIDE -->
  <section>
    <div class="side-label enemy">Opponent <span class="count">2 active + bench</span></div>
    <div class="slot-grid active-grid" id="activeGrid"></div>
    <div class="bench-head">Revealed Bench</div>
    <div class="slot-grid bench-grid" id="benchGrid"></div>
  </section>
</div>

<!-- SPEED LADDER -->
<section id="speedPanel">
  <div class="ladder-head">
    <div class="side-label speed">Speed Ladder <span class="count">Level 50 &middot; live order</span></div>
    <div class="mods">
      <button class="modbtn scope" data-mod="showall" title="Toggle between active-only and the full field">Show All</button>
      <span class="modsep"></span>
      <button class="modbtn" data-mod="tr" title="Trick Room inverts speed order">Trick Room</button>
      <span class="modsep"></span>
      <button class="modbtn side-ally" data-mod="tw-ally" title="Tailwind on your side">Tailwind &middot; You</button>
      <button class="modbtn side-enemy" data-mod="tw-enemy" title="Tailwind on opponent side">Tailwind &middot; Opp</button>
      <span class="modsep"></span>
      <button class="modbtn weather" data-weather="rain" title="Rain \u2014 doubles Swift Swim Speed">Rain</button>
      <button class="modbtn weather" data-weather="sun" title="Sun \u2014 doubles Chlorophyll Speed">Sun</button>

function defProfile(types){

}
function normType(t){t=t.trim().toLowerCase();return TYPES.find(x=>x.toLowerCase()===t)||null;}

/* ---- Threat analysis (type-effectiveness, active vs active) ---- */
// multiplier of an attacking type vs a defender's types
function typeMultVsDef(atkType,defTypes){
  let m=1;
  defTypes.forEach(d=>{const v=(CHART[atkType]&&CHART[atkType][d]!==undefined)?CHART[atkType][d]:1;m*=v;});
  return m;
}
function cleanMoveName(m){return m.replace(/\s*\(\d+%\)\s*$/,'');}
// Given attacker p and defender d, return the strongest offensive interactions.
// Returns {superEff:[{move,type,mult}], immune:[{move,type}] } considering only damaging moves.
function attackReads(attacker,defender){
  const defTypes=defender.types||[];
  const superEff=[],immune=[];
  (attacker.moves||[]).forEach(mv=>{
    const t=moveType(mv);
    if(!t)return; // unknown move type -> skip
    // skip pure status moves: those whose move name maps to a known non-damaging priority-support OR is a common status move
    if(isStatusMove(mv))return;
    const mult=typeMultVsDef(t,defTypes);
    if(mult===0)immune.push({move:cleanMoveName(mv),type:t});
    else if(mult>=2)superEff.push({move:cleanMoveName(mv),type:t,mult});
  });
  // keep the best (highest mult) few
  superEff.sort((a,b)=>b.mult-a.mult);
  return {superEff:superEff.slice(0,3),immune:immune.slice(0,2)};
}
// crude status-move filter: names that never deal damage (so they don't create false threat reads)
const STATUS_MOVES=new Set(["protect","detect","spiky shield","baneful bunker","king's shield","substitute","swords dance","nasty plot","dragon dance","calm mind","bulk up","iron defense","agility","tailwind","reflect","light screen","aurora veil","trick room","rain dance","sunny day","snowscape","sandstorm","will-o-wisp","thunder wave","toxic","spore","sleep powder","stun spore","yawn","taunt","encore","fake tears","charm","screech","cotton spore","helping hand","follow me","rage powder","wide guard","quick guard","coaching","decorate","life dew","heal pulse","aromatic mist","safeguard","misty terrain","grassy terrain","electric terrain","psychic terrain","trick","switcheroo","parting shot","memento","perish song","destiny bond","roost","recover","slack off","soft-boiled","milk drink","morning sun","moonlight","synthesis","wish","stealth rock","spikes","toxic spikes","sticky web","rapid spin","defog","haze","string shot","scary face","glare","sing","hypnosis","confuse ray","leech seed","imprison","magic room","wonder room","gravity","after you","quash","ally switch","whirlwind","roar","light clay","reflect type","acupressure","cotton guard","stockpile","amnesia","barrier","stuff cheeks","strength sap","tidy up"].filter(Boolean));
function isStatusMove(mv){

}

/* ---- Priority moves (auto-detect) ---- */
const PRIO_DMG={"fake out":3,"extreme speed":2,"first impression":2,"upper hand":3,"sucker punch":1,"grassy glide":1,"quick attack":1,"aqua jet":1,"bullet punch":1,"ice shard":1,"mach punch":1,"shadow sneak":1,"vacuum wave":1,"water shuriken":1,"accelerock":1,"jet punch":1};
const PRIO_SUP={"follow me":2,"rage powder":2,"ally switch":2,"protect":4,"detect":4,"spiky shield":4,"baneful bunker":4,"king's shield":4,"quick guard":3,"wide guard":3,"helping hand":5,"endure":4,"feint":2,"baby-doll eyes":1};
function movePrio(name){
  const k=name.trim().toLowerCase().replace(/\s*\(\d+%\)\s*$/,'');
  if(PRIO_DMG[k]!==undefined)return{kind:'dmg',lvl:PRIO_DMG[k],name:name.replace(/\s*\(\d+%\)\s*$/,'')};
  if(PRIO_SUP[k]!==undefined)return{kind:'sup',lvl:PRIO_SUP[k],name:name.replace(/\s*\(\d+%\)\s*$/,'')};
  return null;
}
function priorityOf(p){
  const found=[];
  (p.moves||[]).forEach(m=>{const pr=movePrio(m);if(pr)found.push(pr);});

}

/* ---- Champions speed formula (Level 50, IV=31 fixed) ----
   core = floor((2*Base + 31) * 50/100) + 5
   final = floor((core + SpeedSP) * natureMod)
   Validated against GameWith Champions speed table (Max/Pos/0AP columns exact). */
/* ---- Weather speed abilities ---- */
const WEATHER_ABILITY={ 'swift swim':'rain', 'chlorophyll':'sun', 'sand rush':'sand', 'slush rush':'snow' };
function weatherSpeedAbility(p){
  const a=(p.ability||'').toLowerCase();
  for(const key in WEATHER_ABILITY){ if(a.includes(key))return WEATHER_ABILITY[key]; }
  return null;
}
function speedCore(base){return Math.floor((2*base+31)*50/100)+5;}
function natureSpeedMod(natures){
  // read first-listed nature; +Spe alignments =1.1, -Spe =0.9, else 1.0
  const n=(natures&&natures[0]||'').toLowerCase();
  const plus=['jolly','timid','naive','hasty'];   // raise Speed
  const minus=['brave','quiet','relaxed','sassy']; // lower Speed
  if(plus.some(x=>n.includes(x)))return 1.1;
  if(minus.some(x=>n.includes(x)))return 0.9;
  return 1.0;
}
function parseSpeeds(p){
  // Base Speed cell like "102" or "102 (92)" -> {base:102, mega:92|null}
  const nums=(p.speed||'').match(/\d+/g);
  if(!nums||!nums.length)return{base:null,mega:null};
  return{base:parseInt(nums[0],10), mega:nums.length>1?parseInt(nums[1],10):null};
}
function hasMega(p){return parseSpeeds(p).mega!==null;}
function computeSpeed(p,useMega){
  const sp=parseSpeeds(p);
  let base=sp.base;
  if(useMega&&sp.mega!==null)base=sp.mega;
  if(!base)return null;
  const spv=Math.max(0,Math.min(32,parseInt(p.speedSP||'0',10)||0));
  const mod=natureSpeedMod(p.natures);
  return Math.floor((speedCore(base)+spv)*mod);
}

/* ---- CSV parse ---- */
function parseCSV(text){
  const rows=[];let i=0,f='',row=[],q=false;
  while(i<text.length){const c=text[i];
    if(q){if(c==='"'){if(text[i+1]==='"'){f+='"';i++;}else q=false;}else f+=c;}
    else{if(c==='"')q=true;else if(c===','){row.push(f);f='';}
      else if(c==='\n'){row.push(f);rows.push(row);row=[];f='';}
      else if(c==='\r'){}else f+=c;}
    i++;}
  if(f.length||row.length){row.push(f);rows.push(row);}
  return rows;
}
function toObjects(rows){
  if(!rows.length)return[];
  const H=rows[0].map(h=>h.trim().toLowerCase());
  const idx=n=>H.indexOf(n);
  const iName=idx("pokemon"),iType=idx("type"),iAbil=idx("ability"),iMoves=idx("moves"),
    iItems=idx("held items"),iNat=idx("nature"),iIV=idx("ivs"),iSpd=idx("base speed"),
    iLook=idx("look out for"),iNotes=idx("notes");
  // Speed SP column: accept a few header spellings
  const iSP=[ "speed sp","speedsp","spe sp","speed sp (0-32)","sp speed" ].map(idx).find(x=>x>=0);
  const out=[];
  for(let r=1;r<rows.length;r++){
    const c=rows[r];if(!c)continue;
    const name=(c[iName]||"").trim();if(!name)continue;
    const splitList=s=>(s||"").split(/[,;\n]/).map(x=>x.trim()).filter(Boolean);
    out.push({
      name,
      types:(c[iType]||"").split(/[\/,]/).map(t=>normType(t)).filter(Boolean),
      typeRaw:(c[iType]||"").trim(),
      ability:(c[iAbil]||"").trim(),
      moves:splitList(c[iMoves]),
      items:splitList(c[iItems]),
      natures:splitList(c[iNat]),
      ivs:(c[iIV]||"").trim(),
      speed:(c[iSpd]||"").trim(),
      speedSP:(iSP!==undefined&&iSP>=0?(c[iSP]||"").trim():""),
      lookout:(c[iLook]||"").trim(),
      notes:(c[iNotes]||"").trim()
    });
  }
  return out;
}

    html+='</div>';
  }
  const resists=[...groups["0.25"].map(a=>[a,'¼']),...groups["0.5"].map(a=>[a,'½']),...groups["0"].map(a=>[a,'0'])];
  if(resists.length){
    html+='<div class="section-t" style="color:#41d17f">Resists</div><div class="weakrow">';
    html+=resists.map(([a,l])=>pill(a,l,l)).join('');
    html+='</div>';
  }
  html+='</div>';
  return html;
}

/* ---- Sprites (classic pixel style) ---- */
const DEXNUM={"grimmsnarl":861,"pelipper":279,"swampert":260,"archaludon":1018,"sinistcha":1013,"metagross":376,"incineroar":727,"garchomp":445,"rillaboom":812,"sneasler":903,"kingambit":983,"basculegion":902,"floette":670,"charizard":6,"gholdengo":1000,"amoonguss":591,"landorus":645,"urshifu":892,"ogerpon":1017,"iron hands":992};
function spriteImg(name){
  const key=name.trim().toLowerCase();
  const num=DEXNUM[key];
  const byName=key.replace(/[.'\u2019]/g,'').replace(/\s+/g,'-');
  // primary: official PokeAPI number sprite (classic pixel style); fallback: name-based CDN; then hide
  const primary= num
    ? `https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/${num}.png`
    : `https://img.pokemondb.net/sprites/home/normal/${byName}.png`;
  const fallback=`https://img.pokemondb.net/sprites/home/normal/${byName}.png`;
  return `<img class="pkm-sprite" src="${primary}" alt="" loading="lazy" onerror="this.onerror=null;this.src='${fallback}';">`;
}

function cardBodyEnemy(p){
  let h=`<div class="pkm-head"><div class="pkm-name">${p.name}<span class="clear" data-clear="1">&times;</span></div>${typeChips(p.types)}</div>`;
  if(p.lookout)h+=`<div class="lookout"><div class="lo-t">Look Out For</div><div class="lo-v">${p.lookout}</div></div>`;
  h+=movesHTML(p.moves);
  // Matchup slot lives here (populated by renderThreats)
  h+='<div class="threats-slot"></div>';
  // compact reference rows
  h+='<div class="meta">';
  h+=`<div class="m"><div class="k">Speed</div><div class="v"><span class="base-spd">${p.speed||'&mdash;'}</span></div></div>`;
  if(p.items.length)h+=`<div class="m"><div class="k">Items</div><div class="v">${p.items.join(', ')}</div></div>`;
  if(p.natures.length)h+=`<div class="m"><div class="k">Nature</div><div class="v">${compactNatures(p.natures)}</div></div>`;
  if(p.ivs)h+=`<div class="m"><div class="k">SP</div><div class="v">${p.ivs}</div></div>`;
  if(p.ability)h+=`<div class="m"><div class="k">Ability</div><div class="v">${p.ability}</div></div>`;
  h+='</div>';
  if(p.notes)h+=`<div class="notes-box"><div class="nb-t">Notes</div><div class="nb-v">${p.notes}</div></div>`;
  return h;
}
// "Modest (+SpA, -Atk) · Timid (+Spe, -Atk)" -> "Modest · Timid" with the spread as a tooltip
function compactNatures(natures){
  return natures.map(n=>{
    const name=n.replace(/\s*\(.*?\)\s*/g,'').trim();
    const spread=(n.match(/\((.*?)\)/)||[])[1]||'';
    return spread?`<span title="${spread}">${name}</span>`:name;
  }).join(' &middot; ');
}
function cardBodyAlly(p,fixed,expanded,idx){
  const sprite=spriteImg(p.name);
  const isActive=MYACTIVE.includes(idx);
  const activeBtn=`<span class="act-btn${isActive?' on':''}" data-act="${idx}" title="Mark as active on the field">&#9876; ${isActive?'Active':'Bench'}</span>`;
  const caret=`<span class="caret${expanded?' open':''}">&#9662;</span>`;
  // header: sprite + name + types, always shown
  let h=`<div class="pkm-head"><div class="pkm-name">${sprite}${p.name}${caret}</div>${typeChips(p.types)}</div>`;
  // compact row: speed + active button, always shown
  h+=`<div class="ally-compact"><span class="ac-speed"><span class="ac-k">SPD</span><span class="speed-badge">${p.speed||'&mdash;'}</span></span>${activeBtn}</div>`;
  // expanded details
  if(expanded){
    h+='<div class="ally-details">';
    h+=weakHTML(p.types);
    h+=movesHTML(p.moves);
    h+='<div class="metatop">';
    h+=`<div class="box"><div class="k">Item</div><div class="v">${p.items.length?p.items.join(', '):'&mdash;'}</div></div>`;
    h+=`<div class="box"><div class="k">Nature</div><div class="v">${p.natures.length?p.natures.join(' &middot; '):'&mdash;'}</div></div>`;
    h+='</div>';
    if(p.ability)h+=`<div class="metatop" style="grid-template-columns:1fr"><div class="box"><div class="k">Ability</div><div class="v">${p.ability}</div></div></div>`;
    h+='</div>';
  }
  return h;
}
function cardBodyBench(p){
  let h=`<div class="pkm-head"><div class="pkm-name">${p.name}<span class="clear" data-clear="1">&times;</span></div>${typeChips(p.types)}</div>`;
  if(p.lookout)h+=`<div class="lookout"><div class="lo-t">Watch</div><div class="lo-v">${p.lookout}</div></div>`;
  if(p.speed)h+=`<div class="section-t">Speed <span class="speed-badge" style="font-size:13px">${p.speed}</span></div>`;
  return h;
}

/* ---- Slot factory ---- */
function makeSlot(kind,idx,cls,label){
  const card=document.createElement('div');
  card.className=`card ${cls}${kind==='bench'?'':' big'}`;
  card.dataset.kind=kind;card.dataset.idx=idx;
  card.innerHTML=`
    <div class="card-search">
      <div class="slotname">${label}</div>
      <input type="text" placeholder="Search Pok&eacute;mon&hellip;" autocomplete="off">
      <div class="ac" style="display:none"></div>
    </div>
    <div class="pkm"></div>`;
  const input=card.querySelector('input');
  const ac=card.querySelector('.ac');
  let selIdx=-1,matches=[];
  function render(){
    const q=input.value.trim().toLowerCase();
    matches=q?DEX.filter(p=>p.name.toLowerCase().includes(q)).slice(0,8):[];
    if(!matches.length){ac.style.display='none';return;}
    ac.innerHTML=matches.map((p,i)=>`<div data-i="${i}" class="${i===selIdx?'sel':''}">${p.name}<span class="mini-types">${p.types.map(t=>`<span class="chip" style="background:${TYPE_COLORS[t]};font-size:9px;padding:2px 6px">${t}</span>`).join('')}</span></div>`).join('');
    ac.style.display='block';
  }
  function choose(p){SLOTS[kind][idx]=p.name;fill(card,kind,p);ac.style.display='none';input.value='';}
  input.addEventListener('input',()=>{selIdx=-1;render();});
  input.addEventListener('keydown',e=>{
    if(ac.style.display==='none')return;
    if(e.key==='ArrowDown'){selIdx=Math.min(selIdx+1,matches.length-1);render();e.preventDefault();}
    else if(e.key==='ArrowUp'){selIdx=Math.max(selIdx-1,0);render();e.preventDefault();}
    else if(e.key==='Enter'){if(matches[selIdx])choose(matches[selIdx]);else if(matches.length===1)choose(matches[0]);e.preventDefault();}
    else if(e.key==='Escape'){ac.style.display='none';}
  });
  ac.addEventListener('mousedown',e=>{const d=e.target.closest('[data-i]');if(d)choose(matches[+d.dataset.i]);});
  input.addEventListener('blur',()=>setTimeout(()=>ac.style.display='none',150));
  card.querySelector('.pkm').addEventListener('click',e=>{if(e.target.dataset.clear){SLOTS[kind][idx]=null;unfill(card);}});
  return card;
}
function fill(card,kind,p){
  const body=card.querySelector('.pkm');
  body.innerHTML=kind==='ally'?cardBodyAlly(p):kind==='bench'?cardBodyBench(p):cardBodyEnemy(p);
  card.classList.add('filled');
  renderLadder();
  renderThreats();
}
function unfill(card){card.classList.remove('filled');card.querySelector('.pkm').innerHTML='';const i=card.querySelector('input');i.value='';
  const k=card.dataset.kind+':'+card.dataset.idx;delete SCARF[k];delete PARA[k];delete MEGA[k];
  renderLadder();renderThreats();}

/* ---- Threat badges on opponent active cards ---- */
function renderThreats(){
  // clear existing threat content
  document.querySelectorAll('.card[data-kind="active"] .threats-slot').forEach(el=>{el.innerHTML='';});
  const myMons=MYACTIVE.map(i=>MYTEAM[i]).filter(Boolean);
  [0,1].forEach(idx=>{
    const card=document.querySelector(`.card[data-kind="active"][data-idx="${idx}"]`);
    if(!card||!card.classList.contains('filled'))return;
    const slot=card.querySelector('.threats-slot');
    if(!slot)return;
    const nm=SLOTS.active[idx];const opp=nm?DEXMAP[nm.toLowerCase()]:null;
    if(!opp)return;
    if(!myMons.length)return; // nothing to compare until you mark active mons
    const rows=[];
    myMons.forEach(my=>{
      const oppHitsMy=attackReads(opp,my);     // opp attacking my mon
      const myHitsOpp=attackReads(my,opp);     // my mon attacking opp
      const parts=[];
      oppHitsMy.superEff.forEach(s=>parts.push(`<span class="thr danger" title="${opp.name}'s ${s.move} is ${s.mult}x on your ${my.name}">&#9888; ${s.move} ${s.mult}&times; &rarr; ${my.name}</span>`));
      oppHitsMy.immune.forEach(s=>parts.push(`<span class="thr immune" title="Your ${my.name} is immune to ${s.type}">&#128737; ${my.name} immune to ${s.move}</span>`));
      myHitsOpp.superEff.forEach(s=>parts.push(`<span class="thr good" title="Your ${my.name}'s ${s.move} is ${s.mult}x on ${opp.name}">&#9876; ${my.name}: ${s.move} ${s.mult}&times;</span>`));
      myHitsOpp.immune.forEach(s=>parts.push(`<span class="thr oppimmune" title="${opp.name} is immune to your ${s.move}">${opp.name} immune to ${s.move}</span>`));
      if(parts.length)rows.push(`<div class="thr-row"><span class="thr-vs">vs ${my.name}</span><div class="thr-list">${parts.join('')}</div></div>`);
      else rows.push(`<div class="thr-row"><span class="thr-vs">vs ${my.name}</span><div class="thr-list"><span class="thr even">even matchup</span></div></div>`);
    });
    slot.innerHTML=`<div class="threats"><div class="thr-head">Matchup</div>${rows.join('')}</div>`;
  });
}

/* ---- Speed Ladder ---- */
function sideOf(kind){return kind==='ally'?'ally':'enemy';}
function renderLadder(){
  const box=document.getElementById('ladder');
  const note=document.getElementById('ladderNote');
  // gather every filled slot that has a computable speed
  const entries=[];
  const pushEntry=(p,kind,idx)=>{
    const key=kind+':'+idx;
    const canMega=hasMega(p);
    const isMega=canMega&&!!MEGA[key];
    const base=computeSpeed(p,isMega);if(base===null)return;
    const side=sideOf(kind);
    let spd=base;
    if(SCARF[key])spd=Math.floor(spd*1.5);
    // weather speed ability (Swift Swim etc.) doubles when its weather is active
    const wAbility=weatherSpeedAbility(p);
    const weatherBoost=(wAbility && FIELD.weather===wAbility);
    if(weatherBoost)spd=Math.floor(spd*2);
    if((side==='ally'&&FIELD['tw-ally'])||(side==='enemy'&&FIELD['tw-enemy']))spd=Math.floor(spd*2);
    if(PARA[key])spd=Math.floor(spd*0.5);
    entries.push({p,kind,idx,key,side,base,spd,canMega,isMega,weatherBoost,prio:priorityOf(p)});
  };
  // ally side: fixed MyTeam (active-only unless Show All)
  MYTEAM.forEach((p,idx)=>{
    if(!FIELD.showall && !MYACTIVE.includes(idx))return;
    pushEntry(p,'ally',idx);
  });
  // opponent side: filled search slots (active-only unless Show All shows bench too)
  const oppKinds=FIELD.showall?['active','bench']:['active'];
  oppKinds.forEach(kind=>{
    SLOTS[kind].forEach((nm,idx)=>{
      if(!nm)return;const p=DEXMAP[nm.toLowerCase()];if(!p)return;
      pushEntry(p,kind,idx);
    });
  });
  if(!entries.length){
    const msg=FIELD.showall?'Fill in Pok&eacute;mon to see the speed order.':'Mark your active Pok&eacute;mon (click a team card) and add opponents to see the field speed order. Or tap <b>Show All</b>.';
    box.innerHTML=`<div class="ladder-empty">${msg}</div>`;note.innerHTML='';return;
  }
  // sort: Trick Room inverts (slowest first)
  entries.sort((a,b)=> FIELD.tr ? a.spd-b.spd : b.spd-a.spd);
  // detect speed ties (2+ mons sharing the exact same final speed)
  const speedCounts={};
  entries.forEach(e=>{speedCounts[e.spd]=(speedCounts[e.spd]||0)+1;});
  box.innerHTML=entries.map((e,i)=>{
    const isTie=speedCounts[e.spd]>1;
    const dmgP=e.prio.filter(x=>x.kind==='dmg');
    const supP=e.prio.filter(x=>x.kind==='sup');
    const badges=[
      isTie?`<span class="pbadge tie" title="Speed tie \u2014 50/50 who moves first">&#8646; Tie</span>`:'',
      ...dmgP.map(x=>`<span class="pbadge dmg" title="Priority +${x.lvl} damaging move">&#9889; ${x.name}</span>`),
      ...supP.slice(0,2).map(x=>`<span class="pbadge sup" title="Priority +${x.lvl} support move">${x.name}</span>`)
    ].filter(Boolean).join('');
    const scarfOn=SCARF[e.key]?' on':'';
    const parOn=PARA[e.key]?' on':'';
    const megaOn=e.isMega?' on':'';
    const sub=[];
    if(e.isMega)sub.push('Mega');
    if(e.weatherBoost)sub.push(FIELD.weather.charAt(0).toUpperCase()+FIELD.weather.slice(1)+' x2');
    if(SCARF[e.key])sub.push('Scarf');
    if((e.side==='ally'&&FIELD['tw-ally'])||(e.side==='enemy'&&FIELD['tw-enemy']))sub.push('Tailwind');
    if(PARA[e.key])sub.push('Para');
    const subtxt=sub.length?`<span class="lad-sub">${sub.join(' + ')}</span>`:`<span class="lad-sub">${e.side==='ally'?'You':'Opp'}</span>`;
    const megaBtn=e.canMega?`<span class="lad-mega${megaOn}" data-mega="${e.key}" title="Toggle Mega Evolution speed">Mega</span>`:'';
    return `<div class="lad-row ${e.side}${isTie?' tie':''}">
      <div class="lad-rank">${i+1}</div>
      <div class="lad-main">
        <span class="lad-name">${e.p.name}${e.isMega?' <span class="mega-mark" title="Mega Evolved">M</span>':''}</span>
        <span class="lad-badges">${badges}</span>
      </div>
      <div class="lad-spd">
        <div class="lad-tools">
          ${megaBtn}
          <span class="lad-scarf${scarfOn}" data-scarf="${e.key}" title="Toggle Choice Scarf (x1.5)">Scarf</span>
          <span class="lad-par${parOn}" data-par="${e.key}" title="Toggle Paralysis (x0.5)">Par</span>
        </div>
        <span class="lad-num">${e.spd}</span>
        ${subtxt}
      </div>
    </div>`;
  }).join('');
  const trTxt=FIELD.tr?'<b style="color:var(--gold)">Trick Room active</b> \u2014 slowest moves first. ':'';
  const scopeTxt=FIELD.showall?'Showing <b>all revealed</b> Pok&eacute;mon. ':'Showing <b>active only</b> (your marked-active + their active). Tap <b>Show All</b> for the full field. ';
  note.innerHTML=`${scopeTxt}${trTxt}Speeds at Lv50 from your Speed SP + nature. &#9889; = damaging priority (ignores speed). Tap Scarf/Par/Mega on a row for one-off modifiers.`;
  // wire per-row toggles
  box.querySelectorAll('[data-scarf]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.scarf;SCARF[k]=!SCARF[k];renderLadder();}));
  box.querySelectorAll('[data-par]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.par;PARA[k]=!PARA[k];renderLadder();}));
  box.querySelectorAll('[data-mega]').forEach(el=>el.addEventListener('click',()=>{const k=el.dataset.mega;MEGA[k]=!MEGA[k];renderLadder();}));
}

/* ---- Build UI ---- */
function build(){
  // Ally side is now fixed cards from MyTeam (rendered by renderMyTeam), no search slots.
  const acg=document.getElementById('activeGrid');
  for(let i=0;i<2;i++)acg.appendChild(makeSlot('active',i,'enemy',`Active ${i+1}`));
  const bg=document.getElementById('benchGrid');
  for(let i=0;i<4;i++)bg.appendChild(makeSlot('bench',i,'enemy',`Bench ${i+1}`));
}
function renderMyTeam(){
  const ag=document.getElementById('allyGrid');
  ag.innerHTML='';
  if(!MYTEAM.length){
    ag.innerHTML='<div class="ladder-empty" style="grid-column:1/-1">Your MyTeam tab is empty or still loading.</div>';
    return;
  }
  // Display order: active mons first (in activation order), then the rest in original order.
  const activeSet=new Set(MYACTIVE);
  const order=[...MYACTIVE, ...MYTEAM.map((_,i)=>i).filter(i=>!activeSet.has(i))];
  order.forEach(i=>{
    const p=MYTEAM[i];
    const card=document.createElement('div');
    const activeCls=MYACTIVE.includes(i)?' myactive':'';
    const expanded=MYEXPANDED.includes(i);
    const expCls=expanded?' expanded':' collapsed';
    card.className='card ally fixed'+activeCls+expCls;
    card.dataset.kind='ally';card.dataset.idx=i;
    const body=document.createElement('div');
    body.className='pkm';
    body.innerHTML=cardBodyAlly(p,true,expanded,i);
    card.appendChild(body);
    // click card = expand/collapse; click the active button = toggle active (handled via delegation)
    card.addEventListener('click',(e)=>{
      const actEl=e.target.closest('[data-act]');
      if(actEl){e.stopPropagation();toggleMyActive(i);return;}
      toggleExpand(i);
    });
    ag.appendChild(card);
  });
}
function toggleExpand(i){
  const at=MYEXPANDED.indexOf(i);
  if(at>=0)MYEXPANDED.splice(at,1);else MYEXPANDED.push(i);
  renderMyTeam();
}
function toggleMyActive(i){
  const at=MYACTIVE.indexOf(i);
  if(at>=0){MYACTIVE.splice(at,1);}
  else{
    MYACTIVE.push(i);
    if(MYACTIVE.length>2)MYACTIVE.shift(); // keep max 2 (drop oldest)
  }
  renderMyTeam();
  renderThreats();
  renderLadder();
}
function restoreSlots(){
  ['active','bench'].forEach(kind=>{
    SLOTS[kind].forEach((nm,idx)=>{
      if(!nm)return;const p=DEXMAP[nm.toLowerCase()];if(!p)return;
      const card=document.querySelector(`.card[data-kind="${kind}"][data-idx="${idx}"]`);
      if(card)fill(card,kind,p);
    });
  });
}

/* ---- Data load ---- */
function setSync(state,txt){
  const dot=document.getElementById('syncDot'),t=document.getElementById('syncTxt');
  dot.className='dot'+(state==='live'?' live':state==='err'?' err':'');
  t.textContent=txt;
}
async function fetchCSV(url){
  const res=await fetch(url+((url.includes('?')?'&':'?')+'_cb='+Date.now()));
  if(!res.ok)throw new Error('HTTP '+res.status);
  return toObjects(parseCSV(await res.text()));
}
async function load(){
  setSync('','connecting');
  // opponent meta db
  try{
    DEX=await fetchCSV(CSV_URL);
    DEXMAP={};DEX.forEach(p=>DEXMAP[p.name.toLowerCase()]=p);
    setSync('live',DEX.length+' Pok&eacute;mon live');
    document.getElementById('syncTxt').innerHTML=DEX.length+' Pok&eacute;mon live';
    document.getElementById('countTxt').textContent=DEX.length+' opponents loaded';
    restoreSlots();
  }catch(err){
    setSync('err','sheet unreachable');
    document.getElementById('countTxt').textContent='Load error: '+err.message;
    console.error(err);
  }
  // my fixed team
  try{
    MYTEAM=await fetchCSV(MYTEAM_URL);
    renderMyTeam();
    renderLadder();
  }catch(err){
    document.getElementById('allyGrid').innerHTML='<div class="ladder-empty" style="grid-column:1/-1">MyTeam tab unreachable \u2014 check it\'s published.</div>';
    console.error('MyTeam load error',err);
  }
  document.getElementById('veil').classList.add('gone');
}

/* ---- Save / Load team codes ---- */
document.getElementById('refreshBtn').addEventListener('click',()=>{load();});
document.getElementById('resetBtn').addEventListener('click',()=>{
  SLOTS.active=new Array(2).fill(null);SLOTS.bench=new Array(4).fill(null);
  // clear opponent scarf/para state
  Object.keys(SCARF).forEach(k=>{if(k.startsWith('active:')||k.startsWith('bench:'))delete SCARF[k];});
  Object.keys(PARA).forEach(k=>{if(k.startsWith('active:')||k.startsWith('bench:'))delete PARA[k];});
  Object.keys(MEGA).forEach(k=>{if(k.startsWith('active:')||k.startsWith('bench:'))delete MEGA[k];});
  FIELD['tw-enemy']=false;
  FIELD.weather='';
  document.querySelectorAll('.card[data-kind="active"],.card[data-kind="bench"]').forEach(c=>unfill(c));
  syncModBtns();renderLadder();
});

/* field modifier toggle buttons */
function syncModBtns(){
  document.querySelectorAll('.modbtn[data-mod]').forEach(b=>{
    b.classList.toggle('on',!!FIELD[b.dataset.mod]);
  });
  document.querySelectorAll('.modbtn[data-weather]').forEach(b=>{
    b.classList.toggle('on',FIELD.weather===b.dataset.weather);
  });
}
document.querySelectorAll('.modbtn[data-mod]').forEach(b=>{
  b.addEventListener('click',()=>{const m=b.dataset.mod;FIELD[m]=!FIELD[m];syncModBtns();renderLadder();});
});
document.querySelectorAll('.modbtn[data-weather]').forEach(b=>{
  b.addEventListener('click',()=>{
    const w=b.dataset.weather;
    FIELD.weather=(FIELD.weather===w)?'':w; // tap active weather again to clear
    syncModBtns();renderLadder();
  });
});

build();load();renderLadder();
</script>
